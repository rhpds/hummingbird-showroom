apiVersion: noobaa.io/v1alpha1
kind: NooBaa
metadata:
  name: noobaa
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  dbType: postgres
  dbResources:
    requests:
      cpu: "100m"
      memory: 1Gi
  coreResources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      cpu: "500m"
      memory: 4Gi
