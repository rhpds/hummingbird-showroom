apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-operator
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  replicas: 1
  selector:
    matchLabels:
      name: gitea-operator
  template:
    metadata:
      labels:
        name: gitea-operator
    spec:
      serviceAccountName: gitea-operator
      containers:
        - name: gitea-operator
          image: quay.io/rhpds/gitea-operator:latest
          imagePullPolicy: Always
          env:
            - name: WATCH_NAMESPACE
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: gitea-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-operator
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitea-operator
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "services/finalizers", "endpoints",
                "persistentvolumeclaims", "events", "configmaps", "secrets",
                "serviceaccounts"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes", "routes/custom-host"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["gpte.opentlc.com"]
    resources: ["giteas", "giteas/status", "giteas/finalizers"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-operator
  annotations:
    argocd.argoproj.io/sync-wave: "8"
subjects:
  - kind: ServiceAccount
    name: gitea-operator
    namespace: gitea
roleRef:
  kind: ClusterRole
  name: gitea-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: giteas.gpte.opentlc.com
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  group: gpte.opentlc.com
  names:
    kind: Gitea
    listKind: GiteaList
    plural: giteas
    singular: gitea
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
