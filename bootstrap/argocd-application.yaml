apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hummingbird-workshop
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: REPLACE_REPO_URL
    targetRevision: REPLACE_BRANCH
    path: bootstrap
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        maxDuration: 5m
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
