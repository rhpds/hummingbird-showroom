apiVersion: v1
kind: ServiceAccount
metadata:
  name: noobaa-post-config
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: noobaa-post-config
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["noobaa.io"]
    resources: ["noobaas", "backingstores"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noobaa-post-config
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: noobaa-post-config
    namespace: openshift-storage
roleRef:
  kind: ClusterRole
  name: noobaa-post-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: noobaa-post-config
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: noobaa-post-config
      restartPolicy: OnFailure
      containers:
        - name: configure-noobaa
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: NOOBAA_NAMESPACE
              value: "openshift-storage"
            - name: TARGET_MEMORY
              value: "2Gi"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== NooBaa Backing Store Post-Configuration Job ==="

              # Wait for NooBaa CR to be ready
              echo "[1/4] Waiting for NooBaa to be ready..."
              for i in $(seq 1 60); do
                  NOOBAA_PHASE=$(oc get noobaa noobaa -n "${NOOBAA_NAMESPACE}" \
                      -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                  if [ "$NOOBAA_PHASE" = "Ready" ]; then
                      echo "  NooBaa is ready."
                      break
                  fi
                  echo "  Waiting for NooBaa (Phase: ${NOOBAA_PHASE:-NotFound})... (${i}/60)"
                  sleep 10
              done

              if [ "$NOOBAA_PHASE" != "Ready" ]; then
                  echo "ERROR: NooBaa not ready after 10 minutes (Phase: ${NOOBAA_PHASE})."
                  exit 1
              fi

              # Discover backing store name
              echo "[2/4] Discovering NooBaa backing store..."
              BACKING_STORE=""
              for i in $(seq 1 30); do
                  BACKING_STORE=$(oc get backingstore -n "${NOOBAA_NAMESPACE}" \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                  if [ -n "$BACKING_STORE" ]; then
                      echo "  Found backing store: ${BACKING_STORE}"
                      break
                  fi
                  echo "  Waiting for backing store to appear... (${i}/30)"
                  sleep 10
              done

              if [ -z "$BACKING_STORE" ]; then
                  echo "ERROR: No backing store found in namespace ${NOOBAA_NAMESPACE}."
                  exit 1
              fi

              # Check current memory limit
              echo "[3/4] Checking current backing store memory configuration..."
              CURRENT_MEMORY=$(oc get backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                  -o jsonpath='{.spec.pvPool.resources.limits.memory}' 2>/dev/null || echo "")
              echo "  Current memory limit: ${CURRENT_MEMORY:-not set}"

              # Patch backing store if needed
              if [ "$CURRENT_MEMORY" = "${TARGET_MEMORY}" ]; then
                  echo "  Backing store already configured with ${TARGET_MEMORY}. No changes needed."
              else
                  echo "  Patching backing store to increase memory to ${TARGET_MEMORY}..."
                  oc patch backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                      --type=merge \
                      -p "{\"spec\":{\"pvPool\":{\"resources\":{\"limits\":{\"memory\":\"${TARGET_MEMORY}\"},\"requests\":{\"memory\":\"${TARGET_MEMORY}\"}}}}}"

                  if [ $? -eq 0 ]; then
                      echo "  Backing store patched successfully."
                  else
                      echo "ERROR: Failed to patch backing store."
                      exit 1
                  fi
              fi

              # Verify the patch
              echo "[4/4] Verifying backing store configuration..."
              sleep 5  # Give the operator a moment to process the change
              NEW_MEMORY=$(oc get backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                  -o jsonpath='{.spec.pvPool.resources.limits.memory}' 2>/dev/null || echo "")

              if [ "$NEW_MEMORY" = "${TARGET_MEMORY}" ]; then
                  echo "  Verification successful: Memory limit is ${NEW_MEMORY}"
              else
                  echo "  WARNING: Memory limit is ${NEW_MEMORY}, expected ${TARGET_MEMORY}"
                  echo "  The operator may need time to reconcile the change."
              fi

              echo "=== NooBaa Backing Store Post-Configuration Complete ==="
              echo "  Backing Store: ${BACKING_STORE}"
              echo "  Memory Limit: ${TARGET_MEMORY}"
