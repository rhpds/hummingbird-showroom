apiVersion: v1
kind: ServiceAccount
metadata:
  name: noobaa-post-config
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: noobaa-post-config
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["noobaa.io"]
    resources: ["noobaas", "backingstores"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noobaa-post-config
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: noobaa-post-config
    namespace: openshift-storage
roleRef:
  kind: ClusterRole
  name: noobaa-post-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: noobaa-post-config
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: noobaa-post-config
      restartPolicy: OnFailure
      containers:
        - name: configure-noobaa
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: NOOBAA_NAMESPACE
              value: "openshift-storage"
            - name: TARGET_MEMORY
              value: "2Gi"
            - name: ENDPOINT_MEMORY_LIMIT
              value: "6Gi"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== NooBaa Backing Store Post-Configuration Job ==="

              # Wait for NooBaa CR to be ready
              echo "[1/4] Waiting for NooBaa to be ready..."
              for i in $(seq 1 60); do
                  NOOBAA_PHASE=$(oc get noobaa noobaa -n "${NOOBAA_NAMESPACE}" \
                      -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                  if [ "$NOOBAA_PHASE" = "Ready" ]; then
                      echo "  NooBaa is ready."
                      break
                  fi
                  echo "  Waiting for NooBaa (Phase: ${NOOBAA_PHASE:-NotFound})... (${i}/60)"
                  sleep 10
              done

              if [ "$NOOBAA_PHASE" != "Ready" ]; then
                  echo "ERROR: NooBaa not ready after 10 minutes (Phase: ${NOOBAA_PHASE})."
                  exit 1
              fi

              # Discover backing store name
              echo "[2/4] Discovering NooBaa backing store..."
              BACKING_STORE=""
              for i in $(seq 1 30); do
                  BACKING_STORE=$(oc get backingstore -n "${NOOBAA_NAMESPACE}" \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                  if [ -n "$BACKING_STORE" ]; then
                      echo "  Found backing store: ${BACKING_STORE}"
                      break
                  fi
                  echo "  Waiting for backing store to appear... (${i}/30)"
                  sleep 10
              done

              if [ -z "$BACKING_STORE" ]; then
                  echo "ERROR: No backing store found in namespace ${NOOBAA_NAMESPACE}."
                  exit 1
              fi

              # Check current memory limit
              echo "[3/4] Checking current backing store memory configuration..."
              CURRENT_MEMORY=$(oc get backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                  -o jsonpath='{.spec.pvPool.resources.limits.memory}' 2>/dev/null || echo "")
              echo "  Current memory limit: ${CURRENT_MEMORY:-not set}"

              # Patch backing store if needed
              if [ "$CURRENT_MEMORY" = "${TARGET_MEMORY}" ]; then
                  echo "  Backing store already configured with ${TARGET_MEMORY}. No changes needed."
              else
                  echo "  Patching backing store to increase memory to ${TARGET_MEMORY}..."
                  oc patch backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                      --type=merge \
                      -p "{\"spec\":{\"pvPool\":{\"resources\":{\"limits\":{\"memory\":\"${TARGET_MEMORY}\"},\"requests\":{\"memory\":\"${TARGET_MEMORY}\"}}}}}"

                  if [ $? -eq 0 ]; then
                      echo "  Backing store patched successfully."
                  else
                      echo "ERROR: Failed to patch backing store."
                      exit 1
                  fi
              fi

              # Verify the patch
              echo "[4/4] Verifying backing store configuration..."
              sleep 5  # Give the operator a moment to process the change
              NEW_MEMORY=$(oc get backingstore "${BACKING_STORE}" -n "${NOOBAA_NAMESPACE}" \
                  -o jsonpath='{.spec.pvPool.resources.limits.memory}' 2>/dev/null || echo "")

              if [ "$NEW_MEMORY" = "${TARGET_MEMORY}" ]; then
                  echo "  Verification successful: Memory limit is ${NEW_MEMORY}"
              else
                  echo "  WARNING: Memory limit is ${NEW_MEMORY}, expected ${TARGET_MEMORY}"
                  echo "  The operator may need time to reconcile the change."
              fi

              # Patch noobaa-endpoint deployment memory limit
              # The NooBaa CRD does not expose endpoint resources, so we patch
              # the operator-managed deployment directly. Without this the endpoint
              # pod has a hard 2Gi limit and is OOMKilled during concurrent blob
              # uploads, causing EOF errors on Quay image pushes.
              echo "[5/5] Patching noobaa-endpoint deployment memory limit to ${ENDPOINT_MEMORY_LIMIT}..."
              for i in $(seq 1 30); do
                  if oc get deployment noobaa-endpoint -n "${NOOBAA_NAMESPACE}" > /dev/null 2>&1; then
                      break
                  fi
                  echo "  Waiting for noobaa-endpoint deployment... (${i}/30)"
                  sleep 10
              done

              CURRENT_ENDPOINT_LIMIT=$(oc get deployment noobaa-endpoint -n "${NOOBAA_NAMESPACE}" \
                  -o jsonpath='{.spec.template.spec.containers[0].resources.limits.memory}' 2>/dev/null || echo "")
              echo "  Current endpoint memory limit: ${CURRENT_ENDPOINT_LIMIT:-not set}"

              if [ "${CURRENT_ENDPOINT_LIMIT}" = "${ENDPOINT_MEMORY_LIMIT}" ]; then
                  echo "  Endpoint already at ${ENDPOINT_MEMORY_LIMIT}. No change needed."
              else
                  oc patch deployment noobaa-endpoint -n "${NOOBAA_NAMESPACE}" --type='json' -p="[
                    {\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/resources/limits/memory\",\"value\":\"${ENDPOINT_MEMORY_LIMIT}\"}
                  ]" && echo "  noobaa-endpoint deployment patched to ${ENDPOINT_MEMORY_LIMIT}." || \
                  echo "  WARNING: Could not patch noobaa-endpoint deployment. Blob push EOF errors may occur under load."
              fi

              echo "=== NooBaa Post-Configuration Complete ==="
              echo "  Backing Store:          ${BACKING_STORE}"
              echo "  Backing Store Memory:   ${TARGET_MEMORY}"
              echo "  Endpoint Memory Limit:  ${ENDPOINT_MEMORY_LIMIT}"
