  name: renovate-cache-pvc
  namespace: renovate-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: gp3-csi-immediate
  resources:
    requests:
      storage: 2Gi
