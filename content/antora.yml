---
name: modules
title: "LB2865: Container Hardening: Zero to Hero with Red Hat Hardened Images"
version: master
nav:
- modules/ROOT/nav.adoc

asciidoc:
  attributes:
    # page-toclevels: -1               # <- This will remove the TOC that appear in the right sidebar at wider resolutions
    page-pagination: true
    workshop-title: "LB2865: Container Hardening: Zero to Hero with Red Hat Hardened Images"
    workshop-duration: '90 minutes'

    weblab-duration: '20 minutes'
    # Module 1 - Developer Environment
    lab1-duration: '20 minutes'
    lab1-audience: 'Developers (Intermediate to Advanced)'
    podman-version: '5.7.1'
    fedora-version: '43'
    rhel9-version: '9.5'
    rhel10-version: '10.0'

    # Module 2 - Platform Engineering
    lab2-duration: '30 minutes'
    lab2-audience: 'Platform Engineers / DevOps (Intermediate to Advanced)'
    openshift-version: '4.21'
    shipwright-operator: 'Builds for Red Hat OpenShift'

    # Upstream Source Registries
    #hummingbird-registry: 'registry.access.rehdat.com/hi'
    hummingbird-registry: 'quay.io/hummingbird-hatchling'
    ubi-registry: 'registry.access.redhat.com/ubi9'

    # Red Hat Trusted Libraries (Tech Preview)
    trusted-libraries-index: 'https://packages.redhat.com/trusted-libraries/python/simple'
    trusted-libraries-docs: 'https://developers.redhat.com/blog/2026/02/27/red-hat-trusted-libraries-trust-and-integrity-your-software-supply-chain'
    trusted-libraries-registry-portal: 'https://access.redhat.com/terms-based-registry/accounts'

    # RHTAS (Red Hat Trusted Artifact Signer)
    rhtas-namespace: 'trusted-artifact-signer'
    keycloak-realm: 'trusted-artifact-signer'
    rhtas-signing-sa: 'rhtas-signer'
    rhtas-builds-namespace: 'hummingbird-builds'

    # Gitea (in-cluster Git service)
    gitea-namespace: 'gitea'
    gitea-admin-user: 'gitea-admin'

    # On-cluster Quay registry (quay_hostname, quay_user, quay_password,
    # quay_url, quay_console_url are injected by the showroom platform)
    quay-namespace: 'quay'

    # ACS (Red Hat Advanced Cluster Security)
    acs-namespace: 'stackrox'

    # Placeholders for lab environment (most are injected by showroom)
    guid: 'PROVIDE-GUID'
    aws-region: 'us-east-1'
    openshift-console: 'https://console-openshift-console.apps.cluster-{guid}.example.com'
    openshift-api: 'https://api.cluster-{guid}.example.com:6443'
    openshift-user: 'admin'
    openshift-password: 'PROVIDED-IN-LAB'

  extensions:
    - ./content/lib/tab-block.js
    - ./content/lib/remote-include-processor.js

