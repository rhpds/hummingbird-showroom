---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
- name: Terminal
  path: /terminal
  port: 443
- name: Red Hat OpenShift Console
  url: 'https://console-openshift-console.${DOMAIN}'
- name: Red Hat Quay Registry
  url: 'https://quay.${DOMAIN}'
- name: Caddy Web Server
  url: 'https://webserver-user-${GUID}-rhel.${DOMAIN}'
- name: Hummingbird Images
  url: 'https://web-app-8bd096.gitlab.io/'
