---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
# OpenShift Console
- name: OpenShift Console
  url: 'https://console-openshift-console.${DOMAIN}'

# Single terminal
- name: Terminal
  path: /terminal
  port: 443

  # Vertical split terminals
  # - name: Bastion
  #   path: /terminal
  #   port: 443
  #   secondary_name: Bastion
  #   secondary_path: /terminal
  #   secondary_port: 443

# External page
- name: Hummingbird Images
  url: 'https://web-app-8bd096.gitlab.io/'
